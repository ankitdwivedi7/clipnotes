services:
  db:
    image: postgres:16-alpine
    container_name: clip-app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: clip_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
